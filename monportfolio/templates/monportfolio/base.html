{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>{% block title %}Portfolio{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{% endblock %}">
  <meta name="keywords" content="{% block meta_keywords %}{% endblock %}">

  {% if site_profile and site_profile.logo %}
    <link href="{{ site_profile.logo.url }}" rel="icon">
    <link href="{{ site_profile.logo.url }}" rel="apple-touch-icon">
  {% else %}
    <link href="{% static 'monportfolio/assets/img/favicon.png' %}" rel="icon">
    <link href="{% static 'monportfolio/assets/img/apple-touch-icon.png' %}" rel="apple-touch-icon">
  {% endif %}

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Mulish:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <link href="{% static 'monportfolio/assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'monportfolio/assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'monportfolio/assets/vendor/aos/aos.css' %}" rel="stylesheet">
  <link href="{% static 'monportfolio/assets/vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
  <link href="{% static 'monportfolio/assets/vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">
  <link href="{% static 'monportfolio/assets/css/main.css' %}" rel="stylesheet">
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block content %}{% endblock %}

  <script src="{% static 'monportfolio/assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  <script src="{% static 'monportfolio/assets/vendor/php-email-form/validate.js' %}"></script>
  <script src="{% static 'monportfolio/assets/vendor/aos/aos.js' %}"></script>
  <script src="{% static 'monportfolio/assets/vendor/typed.js/typed.umd.js' %}"></script>
  <script src="{% static 'monportfolio/assets/vendor/waypoints/noframework.waypoints.js' %}"></script>
  <script src="{% static 'monportfolio/assets/vendor/glightbox/js/glightbox.min.js' %}"></script>
  <script src="{% static 'monportfolio/assets/vendor/imagesloaded/imagesloaded.pkgd.min.js' %}"></script>
  <script src="{% static 'monportfolio/assets/vendor/isotope-layout/isotope.pkgd.min.js' %}"></script>
  <script src="{% static 'monportfolio/assets/vendor/swiper/swiper-bundle.min.js' %}"></script>
  <script src="{% static 'monportfolio/assets/js/main.js' %}"></script>
  <script src="{% static 'monportfolio/custom/js/activity-tracker.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
