{% extends "monportfolio/base.html" %}
{% block title %}Blog{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <h2>Articles</h2>

    {% for post in posts %}
      <div class="mb-4">
        <h4>
          <a href="{% url 'blog_detail' post.id %}">
            {{ post.title }}
          </a>
        </h4>
        <p>{{ post.content|truncatewords:25 }}</p>
      </div>
    {% endfor %}

  </div>
</section>
{% endblock %}
