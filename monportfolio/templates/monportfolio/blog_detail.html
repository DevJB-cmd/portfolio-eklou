{% extends "monportfolio/base.html" %}
{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <h2>{{ post.title }}</h2>
    {% if post.image %}
      <img src="{{ post.image.url }}" class="img-fluid">
    {% endif %}
    <p>{{ post.content }}</p>
  </div>
</section>
{% endblock %}
